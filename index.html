<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiendaClic - Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="loginAdmin" class="contenedor" style="text-align: center;">
        <h2>🔐 Acceso Administrativo</h2>
        <input type="password" id="inputPass" placeholder="Contraseña de la tienda">
        <button onclick="verificarAcceso()" class="btn-azul">Acceder al Panel</button>
    </div>

    <div id="panelAdmin" class="contenedor" style="display: none;">
        <h1>Cargar Producto</h1>
        <div class="campo"><label>Nombre:</label><input type="text" id="txtProdNombre"></div>
        <div class="campo"><label>Link Imagen:</label><input type="text" id="txtProdImagen"></div>
        <div class="campo"><label>Precio ($):</label><input type="number" id="txtProdPrecio"></div>
        <div class="campo"><label>Stock:</label><input type="number" id="txtProdStock"></div>
        <div class="campo">
            <label>Categoría:</label>
            <select id="txtProdCat">
                <option value="General">General</option>
                <option value="Logos">Logos</option>
                <option value="Redes">Redes Sociales</option>
                <option value="Web">Web</option>
            </select>
        </div>
        <div class="campo"><label>Descripción:</label><textarea id="txtProdDesc"></textarea></div>
        
        <button id="btnGenerarIA" class="btn-ia">✨ Generar descripción con IA</button>
        <button id="btnCargarProducto" class="btn-verde">Subir Producto</button>
    </div>

    <div class="contenedor-ancho">
        <h2>🛒 Catálogo Admin</h2>
        <div id="contenedorCatalogo" class="catalogo"></div>
    </div>

    <hr class="divisor">

    <h2 class="titulo-azul">👁️ Vidriera Pública</h2>
    <div id="contFiltros" class="cont-filtros"></div>
    <div id="contenedorCatalogoPublico" class="catalogo"></div>
        
    <div class="cont-carrito">
        <h2>🛒 Tu Carrito</h2>
        <div id="contenedorCarrito"><p>Tu carrito está vacío.</p></div>
        <div id="totalCarrito" class="total-texto"></div>
        <button id="btnFinalizar" class="btn-verde" style="background-color: #25d366; margin-top: 15px;">
            📦 Finalizar Pedido por WhatsApp
        </button>
    </div>

    <script type="module" src="./config.js"></script>
    <script type="module" src="./tienda.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        import { firebaseConfig } from "./config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Función de seguridad expuesta al window para que el botón pueda verla
        window.verificarAcceso = async () => {
            const passIngresada = document.getElementById("inputPass").value;
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) return alert("Error: ID de tienda no encontrado");

            const snap = await getDoc(doc(db, "configuraciones", id));
            if (snap.exists() && snap.data().password === passIngresada) {
                document.getElementById("panelAdmin").style.display = "block";
                document.getElementById("loginAdmin").style.display = "none";
            } else {
                alert("Contraseña incorrecta");
            }
        };

        // Carga de configuración inicial
        async function arrancarMotor() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;
            try {
                const snap = await getDoc(doc(db, "configuraciones", id));
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.colores) {
                        document.documentElement.style.setProperty('--color-primario', data.colores.primario);
                        document.documentElement.style.setProperty('--color-secundario', data.colores.secundario);
                    }
                    document.title = data.nombreComercial;
                }
            } catch (e) { console.error("Error al cargar config:", e); }
        }
        arrancarMotor();
    </script>
</body>
</html>
